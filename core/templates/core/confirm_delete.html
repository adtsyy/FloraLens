{% extends 'core/base.html' %}

{% block content %}
<main class="container">
    {% if back_arg %}
        <a class="btn" href="{% url back_url back_arg %}">← Kembali</a>
    {% else %}
        <a class="btn" href="{% url back_url %}">← Kembali</a>
    {% endif %}

    <div class="card">
        <h2>Konfirmasi Hapus</h2>
        <p>Yakin ingin menghapus <strong>{{ object_name }}</strong>?</p>
        
        <form method="POST">
            {% csrf_token %}
            <button class="danger" type="submit">Ya, Hapus</button>
        </form>
    </div>
</main>
{% endblock %}
